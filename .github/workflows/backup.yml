name: Database Backup

on:
  schedule:
    # Daily at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is not set — add it in repo Settings > Secrets > Actions." >&2
            exit 1
          fi
          mkdir -p backups
          pg_dump "$DATABASE_URL" --no-owner --no-privileges | gzip > "backups/orochat-$(date -u +%Y-%m-%dT%H-%M-%SZ).sql.gz"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backups/*.sql.gz
          retention-days: 30
